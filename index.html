<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Roulette</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #555;
      --text: #c8c8c8;
      --text-dim: #666;
      --highlight: #fff;
      --accent: #aaa;
      --gold: #b8860b;
    }

    body {
      font-family: 'VT323', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 18px;
    }

    /* CRT scanline effect */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.15) 0px,
        rgba(0,0,0,0.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* Tabs */
    .tab-bar {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      font-family: 'VT323', monospace;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-size: 22px;
      font-family: 'VT323', monospace;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 2px;
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }
    .tab-btn:hover { color: var(--text); }

    .tab-content { display: none; }
    .tab-content.active { display: block; overflow: hidden; }

    /* ASCII Box helper */
    .ascii-box {
      border: 1px solid var(--border);
      position: relative;
    }
    .ascii-box::before {
      content: attr(data-title);
      position: absolute;
      top: -10px;
      left: 12px;
      background: var(--bg);
      padding: 0 6px;
      color: var(--highlight);
      font-size: 16px;
    }

    /* Roulette Tab */
    .roulette-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 40px;
      min-height: calc(100vh - 50px);
    }

    .wheel-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 100%;
      position: relative;
    }

    .page-knight {
      height: 500px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(184,134,11,0.4));
      flex-shrink: 1;
    }
    .page-knight.mirrored {
      transform: scaleX(-1);
    }

    /* Wheel zoom during spin */
    .wheel-container {
      z-index: 10;
      transform-origin: top center;
    }
    .wheel-container.zoomed {
      transform: scale(3.5) translateY(10%);
      transition: transform 1.5s cubic-bezier(0.25, 0.1, 0.25, 1);
      z-index: 50;
    }
    .wheel-container.unzooming {
      transform: scale(1) translateY(0);
      transition: transform 1s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .gothic-header {
      text-align: center;
      margin-bottom: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .gothic-title {
      font-family: 'UnifrakturMaguntia', serif;
      color: var(--gold);
      font-size: 52px;
      line-height: 1.1;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(184,134,11,0.3), 2px 2px 0 #1a1a1a;
    }

    .subtitle {
      color: var(--text-dim);
      margin-bottom: 24px;
      font-size: 20px;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Wheel Container */
    .wheel-container {
      position: relative;
      width: 420px;
      height: 420px;
      margin-bottom: 24px;
      flex-shrink: 0;
    }
    @media (max-width: 500px) {
      .wheel-container { width: 320px; height: 320px; }
      .gothic-title { font-size: 32px; }
    }

    .wheel-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas#wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      image-rendering: auto;
    }

    /* Pointer */
    .pointer {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--highlight);
      font-family: 'VT323', monospace;
      font-size: 36px;
      z-index: 10;
      text-shadow: 0 0 8px rgba(184,134,11,0.6);
      color: var(--gold);
      line-height: 1;
    }

    /* Center spin button */
    .center-spin {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: var(--bg);
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-family: 'VT323', monospace;
      color: var(--gold);
      z-index: 5;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.2;
      text-align: center;
      padding: 4px;
    }
    .center-spin:hover:not(:disabled) {
      background: var(--gold);
      color: var(--bg);
      box-shadow: 0 0 20px rgba(184,134,11,0.5);
    }
    .center-spin:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Result Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--bg);
      border: 2px solid var(--gold);
      padding: 30px 36px;
      text-align: center;
      max-width: 480px;
      width: 92%;
      animation: popIn 0.3s ease;
      position: relative;
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-ascii-border {
      font-family: 'VT323', monospace;
      color: var(--gold);
      font-size: 16px;
      white-space: pre;
      text-align: center;
      margin-bottom: 12px;
    }

    .modal h2 {
      font-size: 22px;
      color: var(--text-dim);
      margin-bottom: 16px;
      font-family: 'VT323', monospace;
      font-weight: normal;
      letter-spacing: 2px;
    }
    .modal .result-name {
      font-size: 32px;
      font-weight: normal;
      margin-bottom: 10px;
      color: var(--gold);
      font-family: 'VT323', monospace;
      letter-spacing: 2px;
    }
    .modal .visit-info {
      color: var(--text-dim);
      margin-bottom: 8px;
      font-size: 20px;
    }
    .modal .visit-dates {
      color: var(--text-dim);
      font-size: 18px;
      margin-bottom: 24px;
    }
    .modal-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .modal-actions button {
      padding: 10px 24px;
      border: 2px solid var(--border);
      background: var(--bg);
      font-size: 22px;
      font-family: 'VT323', monospace;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text);
      letter-spacing: 2px;
    }
    .btn-confirm {
      border-color: var(--gold) !important;
      color: var(--gold) !important;
    }
    .btn-confirm:hover { background: var(--gold); color: var(--bg) !important; }
    .btn-respin:hover { border-color: var(--text); background: #222; }

    /* History Tab */
    .history-page { padding: 20px; max-width: 780px; margin: 0 auto; }
    .history-page h2 {
      text-align: center;
      margin-bottom: 20px;
      color: var(--highlight);
      font-family: 'VT323', monospace;
      font-size: 28px;
      font-weight: normal;
      letter-spacing: 3px;
    }

    .sort-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .sort-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 18px;
      font-family: 'VT323', monospace;
      transition: all 0.15s;
    }
    .sort-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: #1a1a1a;
    }
    .sort-btn:hover { border-color: var(--text); color: var(--text); }

    .history-list { list-style: none; }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #222;
      transition: all 0.15s;
    }
    .history-item:hover { background: #1a1a1a; }
    .history-item.visited .history-name::before {
      content: "* ";
      color: var(--gold);
    }

    .history-name {
      font-size: 20px;
      color: var(--text);
    }
    .history-meta { text-align: right; }
    .history-visits {
      font-size: 18px;
      color: var(--gold);
    }
    .history-dates {
      font-size: 16px;
      color: var(--text-dim);
      margin-top: 1px;
    }
    .history-never {
      font-size: 18px;
      color: #444;
    }

    .stats-bar {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      border: 1px solid var(--gold);
      padding: 10px 18px;
      text-align: center;
      background: var(--bg);
    }
    .stat-number {
      font-size: 30px;
      color: var(--gold);
      font-family: 'VT323', monospace;
    }
    .stat-label {
      font-size: 14px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* Confetti Canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 300;
    }


    /* Easter egg overlay */
    .easter-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 150;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: background 10s ease;
    }
    .easter-overlay.active {
      display: flex;
    }
    .easter-overlay.fade-bg {
      background: rgba(0,0,0,0.95);
    }
    .easter-dialogue {
      font-family: 'VT323', monospace;
      color: var(--text);
      font-size: 36px;
      letter-spacing: 3px;
      opacity: 0;
      transition: opacity 2s ease;
      margin-bottom: 40px;
    }
    .easter-dialogue.show { opacity: 1; }
    .easter-img {
      max-width: 500px;
      max-height: 60vh;
      opacity: 0;
      transition: opacity 4s ease;
      border: 3px solid var(--gold);
      box-shadow: 0 0 40px rgba(184,134,11,0.4);
    }
    .easter-img.show { opacity: 1; }

    /* Blinking cursor effect */
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    .cursor-blink::after {
      content: "_";
      animation: blink 1s infinite;
      color: var(--gold);
    }
  </style>
</head>

<div class="modal-overlay" id="resultModal">

|    THE WHEEL HAS SPOKEN    |
+=============================+</div>

// ─── State (hardcoded — update via git push) ───
let restaurants = INITIAL_RESTAURANTS;

// ─── Wheel Colors — muted, old-world palette ───
const COLORS = [
  "#3a3a3a", "#555", "#2a2a2a", "#4a4a4a", "#333",
  "#484848", "#2e2e2e", "#404040", "#363636", "#505050",
  "#3d3d3d", "#454545", "#2c2c2c", "#525252", "#383838",
  "#4c4c4c", "#303030", "#424242", "#353535", "#4e4e4e"
];

// ─── Draw Wheel ───
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const N = restaurants.length;
const ARC = (2 * Math.PI) / N;
let currentRotation = 0;

function drawWheel(rotation) {
  const W = canvas.width;
  const cx = W / 2, cy = W / 2, r = W / 2 - 4;
  ctx.clearRect(0, 0, W, W);

  for (let i = 0; i < N; i++) {
    const startAngle = rotation + i * ARC;
    const endAngle = startAngle + ARC;

    // Slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + ARC / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#bbb";
    const fontSize = Math.min(28, r * ARC * 0.35);
    ctx.font = `${fontSize}px 'VT323', 'Courier New', monospace`;
    ctx.fillText(restaurants[i].name, r - 30, fontSize / 3);
    ctx.restore();
  }

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.strokeStyle = "#b8860b";
  ctx.lineWidth = 6;
  ctx.stroke();

  // Inner ring decoration
  ctx.beginPath();
  ctx.arc(cx, cy, r - 14, 0, 2 * Math.PI);
  ctx.strokeStyle = "#6b5500";
  ctx.lineWidth = 2;
  ctx.stroke();
}

drawWheel(0);

// ─── Spin Logic ───
let spinning = false;
let selectedIndex = null;

function triggerEasterEgg() {
  const wheelEl = document.getElementById("wheelContainer");
  const roulettePage = document.querySelector(".roulette-page");
  const overlay = document.getElementById("easterOverlay");
  const dialogue = document.getElementById("easterDialogue");
  const img = document.getElementById("easterImg");

  // Wheel keeps spinning the whole time while fading to black
  const startRotation = currentRotation;
  const spinDelta = -(30 + Math.random() * 15) * 2 * Math.PI; // lots of spins
  const spinStart = performance.now();
  const spinDuration = 12000; // 12 seconds of spinning

  wheelEl.classList.remove("unzooming");
  wheelEl.classList.add("zoomed");

  // Start fading to black immediately while wheel is still spinning/zoomed
  overlay.classList.add("active");
  requestAnimationFrame(() => {
    overlay.classList.add("fade-bg");
  });
  roulettePage.style.transition = "opacity 10s ease";
  roulettePage.style.opacity = "0";

  function spinPhase(now) {
    const t = Math.min((now - spinStart) / spinDuration, 1);
    // Ease out the spin gradually
    const eased = 1 - Math.pow(1 - t, 2);
    currentRotation = startRotation + spinDelta * eased;
    drawWheel(currentRotation);
    if (t < 1) {
      requestAnimationFrame(spinPhase);
    }
    // Just let it stop, no unzoom — it's already faded to black by now
  }

  // Show dialogue after 10s (wheel is mostly faded by now)
  setTimeout(() => {
    dialogue.classList.add("show");
  }, 10000);

  // Fade in Chuck E. after 14s
  setTimeout(() => {
    img.classList.add("show");
  }, 14000);

  // Fire confetti and show result after 20s
  setTimeout(() => {
    wheelEl.classList.remove("zoomed");
    fireConfetti();

    document.getElementById("resultName").textContent = ">>> Chuck E. Cheese <<<";
    document.getElementById("visitInfo").textContent = "The 101st tavern reveals itself!";
    document.getElementById("visitDates").textContent = "Where a kid can be a kid.";
    document.getElementById("resultModal").classList.add("show");

    spinning = false;
    document.getElementById("spinBtn").disabled = false;
  }, 20000);

  // Clean up easter overlay when modal is eventually closed
  const origClose = window.closeModal;
  window.closeModal = function() {
    origClose();
    overlay.classList.remove("active", "fade-bg");
    dialogue.classList.remove("show");
    img.classList.remove("show");
    roulettePage.style.transition = "opacity 0.5s ease";
    roulettePage.style.opacity = "1";
    window.closeModal = origClose;
  };

  requestAnimationFrame(spinPhase);
}

function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById("spinBtn").disabled = true;

  // Easter egg: temporarily 1 in 2 for demo, change back to 1/101
  if (Math.random() < 1/2) {
    triggerEasterEgg();
    return;
  }

  const wheelEl = document.getElementById("wheelContainer");

  // Zoom into the wheel so you can watch segments tick by
  wheelEl.classList.remove("unzooming");
  wheelEl.classList.add("zoomed");

  // Spin to a random final angle, then figure out what's under the pointer
  const extraSpins = (15 + Math.random() * 10) * 2 * Math.PI;
  const randomOffset = Math.random() * 2 * Math.PI;
  const finalRotation = currentRotation - extraSpins - randomOffset;

  const startRotation = currentRotation;
  const totalDelta = finalRotation - startRotation;
  const duration = 7000 + Math.random() * 3000;
  const startTime = performance.now();

  function easeOutExpo(t) {
    if (t >= 0.4) {
      const sub = (t - 0.4) / 0.6;
      return 0.7 + 0.3 * (1 - Math.pow(1 - sub, 5));
    }
    return 0.7 * (t / 0.4);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = easeOutExpo(t);
    currentRotation = startRotation + totalDelta * eased;
    drawWheel(currentRotation);

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      // Zoom back out
      wheelEl.classList.remove("zoomed");
      wheelEl.classList.add("unzooming");
      setTimeout(() => {
        wheelEl.classList.remove("unzooming");
        spinning = false;
        // Determine which segment is under the pointer (top = -PI/2)
        const pointerAngle = -Math.PI / 2;
        let normAngle = ((pointerAngle - currentRotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
        const landedIndex = Math.floor(normAngle / ARC) % N;
        selectedIndex = landedIndex;
        showResult(landedIndex);
      }, 1000);
    }
  }

  requestAnimationFrame(animate);
}

// ─── Result Modal ───
function showResult(index) {
  const r = restaurants[index];
  const visitCount = r.dates.length;

  document.getElementById("resultName").textContent = ">>> " + r.name + " <<<";

  if (visitCount === 0) {
    document.getElementById("visitInfo").textContent = "Uncharted territory! Never before visited.";
    document.getElementById("visitDates").textContent = "";
  } else {
    document.getElementById("visitInfo").textContent = `Visited ${visitCount} time${visitCount > 1 ? "s" : ""} before`;
    document.getElementById("visitDates").textContent = "Previous quests: " + r.dates.join(", ");
  }

  document.getElementById("resultModal").classList.add("show");
  fireConfetti();
}

function respin() {
  closeModal();
  spin();
}

function closeModal() {
  document.getElementById("resultModal").classList.remove("show");
  document.getElementById("spinBtn").disabled = false;
}

// ─── Confetti — ASCII style: characters fall instead of colored rectangles ───
function fireConfetti() {
  const canvas = document.getElementById("confetti-canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const chars = ["~", "~", "~", "~", "~", "~", "*", ".", "+"];
  const goldShades = ["#b8860b", "#a0750a", "#c4940d", "#8b6914", "#d4a017", "#926c0a", "#a67c10"];
  const pieces = [];

  for (let i = 0; i < 150; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 300,
      char: chars[Math.floor(Math.random() * chars.length)],
      size: 16 + Math.random() * 20,
      color: goldShades[Math.floor(Math.random() * goldShades.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.15,
      opacity: 1
    });
  }

  let frame = 0;
  function animateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of pieces) {
      p.x += p.vx;
      p.vy += 0.04;
      p.y += p.vy;
      p.rot += p.rotSpeed;
      if (frame > 80) p.opacity -= 0.012;

      if (p.opacity > 0 && p.y < canvas.height + 50) {
        alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.fillStyle = p.color;
        ctx.font = `${p.size}px 'VT323', monospace`;
        ctx.textAlign = "center";
        ctx.fillText(p.char, 0, 0);
        ctx.restore();
      }
    }
    frame++;
    if (alive) requestAnimationFrame(animateConfetti);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(animateConfetti);
}

// ─── History Tab ───
let currentSort = "alpha-asc";

function renderHistory() {
  const visited = restaurants.filter(r => r.dates.length > 0);
  const totalVisits = restaurants.reduce((s, r) => s + r.dates.length, 0);
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-card"><div class="stat-number">${restaurants.length}</div><div class="stat-label">TAVERNS</div></div>
    <div class="stat-card"><div class="stat-number">${visited.length}</div><div class="stat-label">CONQUERED</div></div>
    <div class="stat-card"><div class="stat-number">${restaurants.length - visited.length}</div><div class="stat-label">UNCHARTED</div></div>
    <div class="stat-card"><div class="stat-number">${totalVisits}</div><div class="stat-label">QUESTS</div></div>
  `;

  const sorted = [...restaurants];
  switch (currentSort) {
    case "alpha-asc": sorted.sort((a, b) => a.name.localeCompare(b.name)); break;
    case "alpha-desc": sorted.sort((a, b) => b.name.localeCompare(a.name)); break;
    case "visits-desc": sorted.sort((a, b) => b.dates.length - a.dates.length || a.name.localeCompare(b.name)); break;
    case "visits-asc": sorted.sort((a, b) => a.dates.length - b.dates.length || a.name.localeCompare(b.name)); break;
    case "recent": sorted.sort((a, b) => {
      const parseDate = d => { const [m, day, y] = d.split("/").map(Number); return new Date(2000 + y, m - 1, day); };
      const lastA = a.dates.length ? Math.max(...a.dates.map(d => parseDate(d).getTime())) : 0;
      const lastB = b.dates.length ? Math.max(...b.dates.map(d => parseDate(d).getTime())) : 0;
      return lastB - lastA || a.name.localeCompare(b.name);
    }); break;
  }

  const list = document.getElementById("historyList");
  list.innerHTML = sorted.map(r => {
    const v = r.dates.length;
    return `
      <li class="history-item ${v > 0 ? 'visited' : ''}">
        <span class="history-name">${r.name}</span>
        <div class="history-meta">
          ${v > 0
            ? `<div class="history-visits">${v} visit${v > 1 ? 's' : ''}</div>
               <div class="history-dates">${r.dates.join(', ')}</div>`
            : `<div class="history-never">-- none --</div>`
          }
        </div>
      </li>`;
  }).join("");
}

// ─── Tab Switching ───
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
    if (btn.dataset.tab === "history") renderHistory();
  });
});

// ─── Sort Buttons ───
document.querySelectorAll(".sort-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentSort = btn.dataset.sort;
    renderHistory();
  });
});

// ─── Init ───
renderHistory();

window.addEventListener("resize", () => {
  const c = document.getElementById("confetti-canvas");
  c.width = window.innerWidth;
  c.height = window.innerHeight;
});
